<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Gitee AI 图片编辑</title>
<style>
*{box-sizing:border-box;font-family:system-ui,sans-serif}
body{margin:0;padding:20px;background:#111;color:#fff}
.container{max-width:1200px;margin:0 auto;display:grid;gap:16px}
.card{background:#222;border-radius:12px;padding:16px}
.flex{display:flex;gap:16px;flex-wrap:wrap}
.col{flex:1;min-width:280px}
input,textarea,select{width:100%;padding:10px;border-radius:8px;border:none;background:#333;color:#fff;margin-bottom:10px}
button{width:100%;padding:10px;border-radius:8px;border:0;background:#0099ff;color:#fff;font-weight:bold;cursor:pointer;margin-top:5px}
button:disabled{background:#666;cursor:not-allowed}
.canvas-wrap{position:relative;width:100%;max-width:450px;background:#000;border-radius:8px;overflow:hidden;margin:0 auto}
canvas{position:absolute;left:0;top:0;width:100%;height:100%}
#maskCanvas{pointer-events:none;touch-action:none}
.img-preview{max-width:100%;border-radius:8px;margin-top:10px;display:block;border:2px solid #444}
.tip{font-size:12px;color:#888;margin-top:5px}
.check-item{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.check-item input{width:auto;margin:0}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h3>Gitee AI 图片编辑 | 原图尺寸 | 修复下载</h3>
    <input type="text" id="apiKey" placeholder="请输入你的Gitee API Key">
    <select id="modelSelect">
      <option value="Qwen-Image-Edit" selected>Qwen-Image-Edit (人像推荐)</option>
      <option value="DreamO">DreamO</option>
      <option value="FLUX.1-Kontext-dev">FLUX.1-Kontext-dev</option>
    </select>

    <label class="check-item">
      <input type="checkbox" id="sameStyleCheck">
      <span>✅ 勾选保持原图：样貌、色调、光影、风格完全一致</span>
    </label>

    <textarea id="prompt" rows="3" placeholder="高质量，清晰，细节丰富，8k，写实"></textarea>
  </div>
  <div class="flex">
    <div class="col card">
      <h3>主图 + 涂抹编辑区域</h3>
      <input type="file" id="fileInput" accept="image/*" style="background:#444">
      <div class="canvas-wrap"><canvas id="imgCanvas"></canvas><canvas id="maskCanvas"></canvas></div>
      <button onclick="clearMask()">清空涂抹</button>
    </div>
    <div class="col card">
      <h3>参考图（第二张参考素材）</h3>
      <input type="file" id="refFileInput" accept="image/*" style="background:#444">
      <div class="canvas-wrap" style="aspect-ratio:1/1;"><canvas id="refCanvas"></canvas></div>
      <p class="tip">上传参考图用于风格/构图/人物参考</p>
    </div>
    <div class="col card">
      <h3>生成结果</h3>
      <button id="generateBtn" onclick="doEdit()">开始生成</button>
      <button onclick="downloadResult()" style="background:#28a745;margin-top:8px">⬇ 下载图片</button>
      <p class="tip">严格原图比例+原图尺寸，不会放大裁切</p>
      <img id="result" class="img-preview" alt="生成结果">
    </div>
  </div>
</div>
<script>
const imgCanvas=document.getElementById('imgCanvas'),maskCanvas=document.getElementById('maskCanvas'),refCanvas=document.getElementById('refCanvas');
const ctx=imgCanvas.getContext('2d'),mctx=maskCanvas.getContext('2d'),refCtx=refCanvas.getContext('2d');
let currentImage=null,refImage=null,imgNaturalW=0,imgNaturalH=0,isDrawing=false,currentBase64='';
const MAX_SIZE=4096;
const MASK_MODELS = ['Qwen-Image-Edit'];
const PROXY_LIST=[
  u=>`https://cors.eu.org/${u}`,
  u=>`https://corsproxy.io/?${u}`,
  u=>`https://proxy.cors.sh/${u}`
];
let proxyIndex=0;

function getProxyUrl(t){
  let e=encodeURIComponent(t);
  let f=PROXY_LIST[proxyIndex%PROXY_LIST.length];
  proxyIndex++;
  return f(e);
}
function getPos(e){
  let r=maskCanvas.getBoundingClientRect();
  let t=e.touches?e.touches[0]:e;
  return{x:t.clientX-r.left,y:t.clientY-r.top}
}

mctx.lineCap = "round";
mctx.lineJoin = "round";
refCtx.lineCap = "round";

maskCanvas.addEventListener('touchstart',e=>{e.preventDefault();isDrawing=true;let p=getPos(e);mctx.moveTo(p.x,p.y)});
maskCanvas.addEventListener('touchmove',e=>{if(!isDrawing)return;e.preventDefault();let p=getPos(e);mctx.lineWidth=40;mctx.beginPath();mctx.lineTo(p.x,p.y);mctx.strokeStyle="#fff";mctx.stroke();mctx.moveTo(p.x,p.y)});
maskCanvas.addEventListener('touchend',()=>isDrawing=false);
maskCanvas.addEventListener('mousedown',e=>{isDrawing=true;let p=getPos(e);mctx.moveTo(p.x,p.y)});
maskCanvas.addEventListener('mouseup,mouseleave',()=>isDrawing=false);
maskCanvas.addEventListener('mousemove',e=>{if(!isDrawing)return;let p=getPos(e);mctx.lineWidth=36;mctx.beginPath();mctx.lineTo(p.x,p.y);mctx.strokeStyle="#fff";mctx.moveTo(p.x,p.y)});

// 完全使用【原图真实分辨率】，不会放大压缩
function setCanvasSize(w,h){
  imgNaturalW = w;
  imgNaturalH = h;
  imgCanvas.width = w;
  imgCanvas.height = h;
  maskCanvas.width = w;
  maskCanvas.height = h;
  const wrap = document.querySelector('.canvas-wrap');
  wrap.style.aspectRatio = `${w}/${h}`;
  wrap.style.maxWidth = "450px";
}

function isMaskEmpty(){
  const imgData = mctx.getImageData(0,0,maskCanvas.width,maskCanvas.height);
  return !imgData.data.some(v=>v>0);
}

document.getElementById('fileInput').addEventListener('change',e=>{
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=ev=>{
    let img=new Image();
    img.onload=()=>{
      currentImage=img;
      // 读取原图真实宽高
      setCanvasSize(img.naturalWidth, img.naturalHeight);
      ctx.drawImage(img,0,0,img.naturalWidth, img.naturalHeight);
      clearMask();
    };
    img.src=ev.target.result
  };
  r.readAsDataURL(f)
});

document.getElementById('refFileInput').addEventListener('change',e=>{
  let f=e.target.files[0];if(!f)return;
  let r=new FileReader();
  r.onload=ev=>{
    let img=new Image();
    img.onload=()=>{
      refImage=img;
      const size = 512;
      refCanvas.width=size;refCanvas.height=size;
      refCtx.clearRect(0,0,size,size);
      const scale = Math.min(size/img.width, size/img.height);
      const nw = img.width*scale;
      const nh = img.height*scale;
      const x = (size - nw)/2;
      const y = (size - nh)/2;
      refCtx.drawImage(img,x,y,nw,nh);
    };
    img.src=ev.target.result
  };
  r.readAsDataURL(f)
});

function clearMask(){mctx.clearRect(0,0,maskCanvas.width,maskCanvas.height)}

async function fetchWithRetry(url,opts,retries=3){
  for(let i=0;i<retries;i++){
    try{
      let res=await fetch(getProxyUrl(url),opts);
      if(res.ok) return res;
    }catch(e){}
    proxyIndex++;
  }
  throw new Error('所有代理请求失败');
}

async function doEdit(){
  let key=document.getElementById('apiKey').value.trim();
  let model=document.getElementById('modelSelect').value;
  let prompt=document.getElementById('prompt').value.trim();
  let sameStyleText = document.getElementById('sameStyleCheck').checked 
    ? "严格保留原人物五官样貌、色调、光影、画质、尺寸、比例完全一致，禁止放大、裁切、拉伸" 
    : "";

  if(sameStyleText) prompt = prompt + "，" + sameStyleText;

  let btn=document.getElementById('generateBtn'),resImg=document.getElementById('result');
  if(!currentImage||!prompt||!key){alert('请填写完整信息+上传主图');return}
  btn.disabled=true;btn.innerText='生成中...';
  resImg.src='';currentBase64='';
  try{
    // 用原图尺寸上传，不压缩
    let imgBlob=await new Promise(s=>imgCanvas.toBlob(s,'image/png',1.0));
    let form=new FormData();
    form.append('model',model);
    form.append('prompt',prompt);
    form.append('image',imgBlob,'image.png');

    if(MASK_MODELS.includes(model) && !isMaskEmpty()){
      let maskBlob=await new Promise(s=>maskCanvas.toBlob(s,'image/png',1.0));
      form.append('mask',maskBlob,'mask.png');
    }

    if(refImage){
      let refBlob=await new Promise(s=>refCanvas.toBlob(s,'image/png',1.0));
      form.append('reference_image',refBlob,'reference.png')
    }

    // 强制原图真实尺寸
    let sizeStr = `${imgNaturalW}x${imgNaturalH}`;
    form.append('n',1);
    form.append('size', sizeStr);
    let apiUrl="https://ai.gitee.com/v1/images/edits";

    let res=await fetchWithRetry(apiUrl,{
      method:'POST',
      headers:{Authorization:`Bearer ${key}`},
      body:form
    });

    let json=await res.json();
    console.log('返回数据：',json);

    if(json.data?.[0]?.b64_json){
      currentBase64=`data:image/png;base64,${json.data[0].b64_json}`;
      resImg.src=currentBase64;
      alert('生成成功！已保留原图尺寸，无放大裁切');
    }else if(json.data?.[0]?.url){
      let blob=await (await fetchWithRetry(json.data[0].url,{})).blob();
      currentBase64=await new Promise(s=>{
        let r=new FileReader();
        r.onload=e=>s(e.target.result);
        r.readAsDataURL(blob)
      });
      resImg.src=currentBase64;
      alert('生成成功！已保留原图尺寸，无放大裁切');
    }else{
      alert('模型无返回图像，请更换提示词或模型')
    }
  }catch(e){
    console.error(e);
    alert(`生成失败：${e.message}`)
  }finally{
    btn.disabled=false;btn.innerText='开始生成'
  }
}

// ========== 修复下载无反应 核心代码 ==========
function downloadResult(){
  if(!currentBase64){
    alert('先生成图片再下载');
    return;
  }
  // 创建下载标签，强制触发下载
  let link = document.createElement("a");
  link.href = currentBase64;
  link.download = "edit_原图尺寸.png";
  link.target = "_blank";
  document.body.appendChild(link);
  link.click();
  // 移除标签
  setTimeout(()=>{
    document.body.removeChild(link);
  },100);
}
</script>
</body>
</html>
